name: CI

on:
  push:
    branches: [main, master, 'docs/**', 'feat/**', 'fix/**', 'ref/**']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  analyze:
    name: Análise Estática
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Gerar código (Drift + Riverpod + Freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verificar formatação
        run: dart format . --set-exit-if-changed

      - name: Analisar código
        run: flutter analyze --fatal-warnings --fatal-infos

  test:
    name: Testes
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Gerar código
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Executar testes com cobertura
        run: flutter test --coverage

      - name: Verificar cobertura mínima — Domain (95%)
        run: |
          DOMAIN_COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep -E 'lib/domain' || echo "0%")
          echo "Domain coverage: $DOMAIN_COVERAGE"

      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Gerar código
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (debug)
        run: flutter build apk --debug

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Gerar código
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (sem assinar)
        run: flutter build ios --debug --no-codesign
